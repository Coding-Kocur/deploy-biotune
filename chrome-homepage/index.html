<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome Stanley</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #e0e0e0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            user-select: none;
        }

        /* Particle canvas */
        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        /* Content wrapper */
        .content {
            position: relative;
            z-index: 1;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 48px;
        }

        /* Welcome text */
        .welcome {
            font-size: 38px;
            font-weight: 300;
            letter-spacing: -0.5px;
            color: #9aa0a6;
            opacity: 0;
            animation: fadeInUp 1s ease-out 0.2s forwards;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Search Bar */
        .search-form {
            width: 100%;
            max-width: 580px;
            opacity: 0;
            animation: fadeInUp 1s ease-out 0.35s forwards;
            margin-bottom: 8px;
        }

        .search-container {
            position: relative;
            display: flex;
            align-items: center;
        }

        .search-icon {
            position: absolute;
            left: 20px;
            color: #9aa0a6;
            pointer-events: none;
        }

        .search-input {
            width: 100%;
            padding: 16px 20px 16px 52px;
            border-radius: 28px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #e0e0e0;
            font-size: 16px;
            font-family: 'Inter', sans-serif;
            outline: none;
            backdrop-filter: blur(12px);
            transition: all 0.3s ease;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.2);
        }

        .search-input::placeholder {
            color: rgba(255, 255, 255, 0.35);
        }

        .search-input:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.25);
            box-shadow: 0 8px 32px rgba(66, 133, 244, 0.15);
        }

        /* Links grid */
        .links {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            opacity: 0;
            animation: fadeInUp 1s ease-out 0.5s forwards;
        }

        .link-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            padding: 28px 32px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(12px);
            text-decoration: none;
            color: #e0e0e0;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            min-width: 150px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .link-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 20px;
            background: radial-gradient(circle at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(255, 255, 255, 0.08) 0%, transparent 60%);
            opacity: 0;
            transition: opacity 0.35s ease;
            pointer-events: none;
        }

        .link-card:hover::before {
            opacity: 1;
        }

        .link-card:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.15);
            transform: translateY(-6px) scale(1.03);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        }

        .link-icon {
            width: 52px;
            height: 52px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            transition: transform 0.35s ease;
        }

        .link-card:hover .link-icon {
            transform: scale(1.1);
        }

        .link-icon.wikamp {
            background: linear-gradient(135deg, #1a237e, #3949ab);
        }

        .link-icon.calendar {
            background: linear-gradient(135deg, #4285F4, #137333);
        }

        .link-icon.gemini {
            background: linear-gradient(135deg, #4285F4, #8ab4f8);
        }

        .link-icon.messenger {
            background: linear-gradient(135deg, #0084ff, #00c6ff);
        }

        .link-icon.youtube {
            background: linear-gradient(135deg, #c4302b, #ff6b6b);
        }

        .link-icon.celcat {
            background: linear-gradient(135deg, #ff8f00, #ff3d00);
        }

        .link-icon.maps {
            background: rgba(255, 255, 255, 0.08);
        }

        .link-icon.gmail {
            background: linear-gradient(135deg, #ea4335, #fbbc05);
        }

        .link-icon.instagram {
            background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
        }

        .link-label {
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        /* Subtle bottom glow */
        .glow {
            position: fixed;
            bottom: -100px;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            height: 300px;
            background: radial-gradient(ellipse, rgba(66, 133, 244, 0.08) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* Clock */
        .clock {
            font-size: 14px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.35);
            letter-spacing: 1px;
            opacity: 0;
            animation: fadeInUp 1s ease-out 0.8s forwards;
        }
    </style>
</head>

<body>

    <canvas id="particle-canvas"></canvas>
    <div class="glow"></div>

    <div class="content">
        <h1 class="welcome">Welcome, Stanley</h1>

        <form class="search-form" action="https://www.google.com/search" method="get">
            <div class="search-container">
                <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="text" name="q" class="search-input" placeholder="Search the web..." autocomplete="off" autofocus title="Search query" aria-label="Search the web">
            </div>
        </form>

        <div class="links">
            <a href="https://ife.edu.p.lodz.pl/my/" class="link-card">
                <div class="link-icon wikamp">
                    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" />
                        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" />
                        <line x1="8" y1="7" x2="16" y2="7" />
                        <line x1="8" y1="11" x2="13" y2="11" />
                    </svg>
                </div>
                <span class="link-label">Wikamp IFE</span>
            </a>

            <a href="https://gemini.google.com/" class="link-card">
                <div class="link-icon gemini">
                    <svg width="26" height="26" viewBox="0 0 24 24" fill="white">
                        <path
                            d="M12 2C12 2 14.5 7.5 17 10C19.5 12.5 22 12 22 12C22 12 19.5 12.5 17 15C14.5 17.5 12 22 12 22C12 22 9.5 17.5 7 15C4.5 12.5 2 12 2 12C2 12 4.5 12.5 7 10C9.5 7.5 12 2 12 2Z" />
                    </svg>
                </div>
                <span class="link-label">Gemini</span>
            </a>

            <a href="https://calendar.google.com/" class="link-card">
                <div class="link-icon calendar">
                    <svg width="26" height="26" viewBox="0 0 24 24" fill="none">
                        <rect x="3" y="4" width="18" height="18" rx="2" stroke="white" stroke-width="2" />
                        <line x1="3" y1="10" x2="21" y2="10" stroke="white" stroke-width="2" />
                        <line x1="8" y1="2" x2="8" y2="6" stroke="white" stroke-width="2" stroke-linecap="round" />
                        <line x1="16" y1="2" x2="16" y2="6" stroke="white" stroke-width="2" stroke-linecap="round" />
                        <rect x="7" y="13" width="3" height="3" rx="0.5" fill="white" />
                        <rect x="14" y="13" width="3" height="3" rx="0.5" fill="white" />
                        <rect x="7" y="17" width="3" height="2" rx="0.5" fill="white" opacity="0.6" />
                    </svg>
                </div>
                <span class="link-label">Calendar</span>
            </a>

            <a href="https://www.messenger.com/" class="link-card">
                <div class="link-icon messenger">
                    <svg width="26" height="26" viewBox="0 0 24 24" fill="white">
                        <path
                            d="M12 2C6.477 2 2 6.145 2 11.243c0 2.908 1.438 5.503 3.688 7.2V22l3.39-1.862c.904.251 1.864.387 2.922.387 5.523 0 10-4.145 10-9.243S17.523 2 12 2zm1.075 12.432l-2.55-2.72-4.975 2.72 5.475-5.813 2.613 2.72 4.912-2.72-5.475 5.813z" />
                    </svg>
                </div>
                <span class="link-label">Messenger</span>
            </a>

            <a href="https://www.youtube.com/" class="link-card">
                <div class="link-icon youtube">
                    <svg width="26" height="26" viewBox="0 0 24 24" fill="white">
                        <path
                            d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z" />
                    </svg>
                </div>
                <span class="link-label">YouTube</span>
            </a>

            <a href="https://lodz.celcat.cloud/cal/?r=CyMlD&v=grid&z=1&w=1&dt=1773187200000&dta=1773187200000" class="link-card">
                <div class="link-icon celcat">
                    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <polyline points="12 6 12 12 16 14"></polyline>
                    </svg>
                </div>
                <span class="link-label">Celcat</span>
            </a>

            <a href="https://www.google.com/maps" class="link-card">
                <div class="link-icon maps" style="background: transparent;">
                    <img src="maps_icon.png" width="40" height="40" alt="Google Maps" style="object-fit: contain;">
                </div>
                <span class="link-label">Maps</span>
            </a>

            <a href="https://mail.google.com/" class="link-card">
                <div class="link-icon gmail">
                    <svg width="26" height="26" viewBox="0 0 24 24" fill="white">
                        <path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/>
                    </svg>
                </div>
                <span class="link-label">Gmail</span>
            </a>

            <a href="https://www.instagram.com/" class="link-card">
                <div class="link-icon instagram">
                    <svg width="26" height="26" viewBox="0 0 24 24" fill="white">
                        <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C16.67.014 16.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/>
                    </svg>
                </div>
                <span class="link-label">Instagram</span>
            </a>
        </div>

        <div class="clock" id="clock"></div>
    </div>

    <script>
        // ===== PARTICLE ANIMATION (inspired by antigravity.google) =====
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        const mouse = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
        let animationId;

        // Google-inspired colors adjusted for dark theme (slightly brighter/more vibrant)
        const colors = [
            '#5e9bff',  // Blue (brighter)
            '#ff6b5e',  // Red (softer)
            '#ffd54f',  // Yellow (warm)
            '#4eca6a',  // Green (vivid)
            '#a78bfa',  // Purple (accent)
            '#ff8a80',  // Coral
        ];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function createParticle() {
            const color = colors[Math.floor(Math.random() * colors.length)];
            return {
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                baseX: Math.random() * canvas.width,
                baseY: Math.random() * canvas.height,
                size: Math.random() * 2.5 + 0.8,
                length: Math.random() * 6 + 2,     // dash length
                color: color,
                alpha: Math.random() * 0.5 + 0.2,
                angle: Math.random() * Math.PI * 2,
                rotationSpeed: (Math.random() - 0.5) * 0.02,
                vx: 0,
                vy: 0,
                driftX: (Math.random() - 0.5) * 0.3,
                driftY: (Math.random() - 0.5) * 0.3,
            };
        }

        function init() {
            resize();
            particles = [];
            const count = Math.min(Math.floor((canvas.width * canvas.height) / 5000), 300);
            for (let i = 0; i < count; i++) {
                particles.push(createParticle());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            particles.forEach(p => {
                // Calculate distance to mouse
                const dx = mouse.x - p.x;
                const dy = mouse.y - p.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                const maxDist = 200;

                if (dist < maxDist) {
                    // Particles gently orbit/swirl around cursor
                    const force = (1 - dist / maxDist) * 0.8;
                    const attractAngle = Math.atan2(dy, dx);
                    // Perpendicular component for orbiting + slight attraction
                    p.vx += (Math.cos(attractAngle + Math.PI / 2) * force * 0.5 + Math.cos(attractAngle) * force * 0.15);
                    p.vy += (Math.sin(attractAngle + Math.PI / 2) * force * 0.5 + Math.sin(attractAngle) * force * 0.15);
                }

                // Gentle drift
                p.vx += p.driftX * 0.01;
                p.vy += p.driftY * 0.01;

                // Return to base position very slowly
                p.vx += (p.baseX - p.x) * 0.0003;
                p.vy += (p.baseY - p.y) * 0.0003;

                // Apply friction
                p.vx *= 0.97;
                p.vy *= 0.97;

                // Update position
                p.x += p.vx;
                p.y += p.vy;

                // Rotate
                p.angle += p.rotationSpeed;

                // Draw dash
                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(p.angle);
                ctx.globalAlpha = p.alpha;
                ctx.fillStyle = p.color;
                ctx.fillRect(-p.length / 2, -p.size / 2, p.length, p.size);
                ctx.restore();
            });

            animationId = requestAnimationFrame(animate);
        }

        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        window.addEventListener('resize', () => {
            resize();
            // Re-distribute base positions
            particles.forEach(p => {
                p.baseX = Math.random() * canvas.width;
                p.baseY = Math.random() * canvas.height;
            });
        });

        init();
        animate();

        // ===== CLOCK =====
        function updateClock() {
            const now = new Date();
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' };
            document.getElementById('clock').textContent = now.toLocaleDateString('en-US', options);
        }
        updateClock();
        setInterval(updateClock, 10000);

        // ===== CARD MOUSE GLOW =====
        document.querySelectorAll('.link-card').forEach(card => {
            card.addEventListener('mousemove', (e) => {
                const rect = card.getBoundingClientRect();
                const x = ((e.clientX - rect.left) / rect.width) * 100;
                const y = ((e.clientY - rect.top) / rect.height) * 100;
                card.style.setProperty('--mouse-x', x + '%');
                card.style.setProperty('--mouse-y', y + '%');
            });
        });
    </script>
</body>

</html>
