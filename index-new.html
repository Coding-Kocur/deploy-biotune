<!DOCTYPE html>
<html lang="pl" class="scroll-smooth dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioTune - Precyzja w każdym miligramie</title>
    <meta name="description"
        content="BioTune - odczynniki chemiczne o najwyższej czystości do zastosowań laboratoryjnych. Precyzja w każdym miligramie.">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'biotune-black': '#0a0a0a',
                        'biotune-dark': '#1a1a1a',
                        'biotune-red': '#ff0000',
                        'biotune-text': '#cccccc',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/custom.css">
    <link rel='icon' type='image/png' href='./assets/favicon.png'>
</head>

<body class="bg-biotune-black text-white font-sans antialiased selection:bg-biotune-red selection:text-white">

    <!-- Navigation -->
    <nav class="fixed top-0 w-full z-50 glass border-b border-white/5 transition-colors duration-300">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-20">
                <!-- Left: Navigation Links -->
                <div class="hidden md:flex items-center space-x-6">
                    <a href="shop.html"
                        class="hover:text-biotune-red transition-colors px-3 py-2 rounded-md text-sm font-medium">
                        Sklep
                    </a>
                    <a href="about.html"
                        class="hover:text-biotune-red transition-colors px-3 py-2 rounded-md text-sm font-medium">O
                        Nas</a>
                    <a href="#contact"
                        class="hover:text-biotune-red transition-colors px-3 py-2 rounded-md text-sm font-medium">Kontakt</a>
                </div>

                <!-- Center: Logo -->
                <div class="absolute left-1/2 transform -translate-x-1/2">
                    <a href="index.html" class="flex items-center">
                        <img src="./assets/biotune-logo-dark-mode.png" alt="BioTune" class="h-16 w-auto">
                    </a>
                </div>

                <!-- Right: Icons -->
                <div class="flex items-center gap-4 ml-auto">
                    <div class="relative group hidden md:block">
                        <input type="text" placeholder="Szukaj..."
                            class="bg-black/50 border border-white/10 rounded-full py-1 px-4 text-sm focus:outline-none focus:border-biotune-red transition-colors w-32 focus:w-48 text-white">
                    </div>
                    <div class="account-dropdown">
                        <a href="login.html" id="account-link" class="hover:text-biotune-red transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                                stroke="currentColor" class="w-6 h-6">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" />
                            </svg>
                        </a>
                        <div id="account-menu" class="account-menu">
                            <p class="text-sm text-gray-400 mb-4">Zaloguj się, aby kontynuować</p>
                            <div class="space-y-2">
                                <a href="login.html"
                                    class="block w-full text-center bg-biotune-red text-white px-4 py-2 rounded-lg hover:bg-red-600 transition-colors font-medium">
                                    Zaloguj się
                                </a>
                                <a href="register.html"
                                    class="block w-full text-center border border-white/20 px-4 py-2 rounded-lg hover:bg-white/10 transition-colors font-medium">
                                    Zarejestruj się
                                </a>
                            </div>
                        </div>
                    </div>
                    <button id="theme-toggle" class="p-2 rounded-full hover:bg-white/10 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                            stroke="currentColor" class="w-6 h-6">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z" />
                        </svg>
                    </button>
                    <div class="relative group flex items-center">
                        <button id="wishlist-trigger" class="relative hover:text-biotune-red transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                                stroke="currentColor" class="w-6 h-6">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12z" />
                            </svg>
                            <span id="wishlist-count"
                                class="absolute -top-2 -right-2 bg-biotune-red text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full hidden">0</span>
                        </button>
                    </div>
                    <button id="cart-trigger" class="relative hover:text-biotune-red transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                            stroke="currentColor" class="w-6 h-6">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M15.75 10.5V6a3.75 3.75 0 10-7.5 0v4.5m11.356-1.993l1.263 12c.07.665-.45 1.243-1.119 1.243H4.25a1.125 1.125 0 01-1.12-1.243l1.264-12A1.125 1.125 0 015.513 7.5h12.974c.576 0 1.059.435 1.119 1.007zM8.625 10.5a.375.375 0 11-.75 0 .375.375 0 01.75 0zm7.5 0a.375.375 0 11-.75 0 .375.375 0 01.75 0z" />
                        </svg>
                        <span id="cart-count"
                            class="absolute -top-2 -right-2 bg-biotune-red text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full hidden shadow-[0_0_8px_rgba(255,0,0,0.6)]">0</span>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero-section pt-32 px-4">
        <!-- Large Logo -->
        <img src="./assets/biotune-logo-dark-mode.png" alt="BioTune" class="hero-logo">

        <!-- Typewriter Taglines -->
        <div id="hero-taglines"></div>

        <!-- Image Carousel -->
        <div id="hero-carousel"></div>

        <!-- Progress Bars -->
        <div id="carousel-progress"></div>

        <!-- CTA Button -->
        <div class="mt-12">
            <a href="shop.html"
                class="inline-flex items-center gap-2 bg-biotune-red text-white font-bold py-4 px-8 rounded-lg hover:bg-red-600 transition-all duration-300 shadow-lg hover:shadow-[0_0_20px_rgba(255,0,0,0.4)]">
                <span>Przejdź do sklepu</span>
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2"
                    stroke="currentColor" class="w-5 h-5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3" />
                </svg>
            </a>
        </div>
    </section>

    <!-- Newsletter Section -->
    <section class="newsletter-section mt-24">
        <h2 class="newsletter-title">Dołącz do naszego newslettera</h2>
        <form class="newsletter-form">
            <div class="newsletter-input-group">
                <input type="email" class="newsletter-input" placeholder="Podaj adres email" required>
                <button type="submit" class="newsletter-button">Zapisz się</button>
            </div>
            <label class="newsletter-consent">
                <input type="checkbox" required>
                <span>Wyrażam zgodę na przetwarzanie podanych powyżej danych osobowych w celu otrzymywania
                    newslettera.</span>
            </label>
            <div class="newsletter-feedback"></div>
        </form>
    </section>

    <!-- Contact Section -->
    <section id="contact" class="py-24 bg-biotune-dark relative overflow-hidden">
        <div class="max-w-3xl mx-auto px-4 relative z-10">
            <h2 class="text-3xl font-bold mb-8 text-center text-white">SKONTAKTUJ SIĘ Z NAMI</h2>
            <form class="space-y-6">
                <div class="group">
                    <label class="block text-sm font-medium text-gray-400 mb-1">Imię</label>
                    <input type="text"
                        class="w-full bg-transparent border-b border-gray-700 py-2 focus:outline-none focus:border-biotune-red transition-colors text-white placeholder-gray-600">
                </div>
                <div class="group">
                    <label class="block text-sm font-medium text-gray-400 mb-1">Email</label>
                    <input type="email"
                        class="w-full bg-transparent border-b border-gray-700 py-2 focus:outline-none focus:border-biotune-red transition-colors text-white placeholder-gray-600">
                </div>
                <div class="group">
                    <label class="block text-sm font-medium text-gray-400 mb-1">Wiadomość</label>
                    <textarea rows="4"
                        class="w-full bg-transparent border-b border-gray-700 py-2 focus:outline-none focus:border-biotune-red transition-colors text-white placeholder-gray-600"></textarea>
                </div>
                <button type="button"
                    class="w-full bg-biotune-red text-white font-bold py-3 px-6 hover:bg-red-600 transition-colors uppercase tracking-wider">Wyślij
                    Wiadomość</button>
            </form>
        </div>
        <footer class="mt-24 border-t border-white/5 pt-8 text-center text-gray-500 text-sm">
            <p>&copy; 2025 BioTune. Wszelkie prawa zastrzeżone.</p>
            <div class="flex justify-center gap-4 mt-2">
                <a href="regulamin.html" target="_blank" class="hover:text-biotune-red transition-colors">Regulamin</a>
                <span>|</span>
                <a href="privacy.html" target="_blank" class="hover:text-biotune-red transition-colors">Polityka
                    Prywatności</a>
            </div>
        </footer>
    </section>

    <!-- Cart Drawer -->
    <div id="cart-drawer"
        class="fixed inset-y-0 right-0 w-full sm:w-96 bg-biotune-dark border-l border-white/10 transform translate-x-full transition-transform duration-300 z-[60] shadow-2xl flex flex-col text-white">
        <div class="p-6 border-b border-white/10 flex justify-between items-center">
            <h2 class="text-xl font-bold">Twój Koszyk</h2>
            <button id="close-cart" class="text-gray-400 hover:text-white">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                    stroke="currentColor" class="w-6 h-6">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>
        <div id="cart-items" class="flex-1 overflow-y-auto p-6 space-y-4">
            <p class="text-center text-gray-500 mt-10">Twój koszyk jest pusty.</p>
        </div>
        <div class="p-6 border-t border-white/10 bg-black/20">
            <div class="flex justify-between items-center mb-4 text-lg font-bold">
                <span>Suma:</span>
                <span id="cart-total">0.00 PLN</span>
            </div>
            <button id="checkout-btn"
                class="w-full bg-biotune-red text-white font-bold py-3 px-6 hover:bg-red-600 transition-colors uppercase tracking-wider">Przejdź
                do kasy</button>
        </div>
    </div>

    <div id="overlay"
        class="fixed inset-0 bg-black/80 backdrop-blur-sm z-[55] hidden opacity-0 transition-opacity duration-300">
    </div>

    <!-- Scripts -->
    <script src="./js/products-data.js"></script>
    <script src="./js/hero-carousel.js"></script>
    <script src="./js/hero-typewriter.js"></script>
    <script src="./js/newsletter.js"></script>
    <script src="./js/main.js"></script>
    <script>
        
    </script>
</body>

</html>
